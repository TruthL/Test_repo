name: Initialize Version Bump Check

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]

permissions:
  statuses: write

jobs:
  block-merge:
    # Only parent PRs with "version bump"; skip auto-bump PRs
    if: >
      contains(github.event.pull_request.labels.*.name, 'version bump') &&
      !contains(github.event.pull_request.labels.*.name, 'automated-version-bump') &&
      !startsWith(github.event.pull_request.head.ref, 'chore/auto-bump-')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set Status to Success
        if: contains(github.event.pull_request.labels.*.name, 'version bumped')
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -d '{
              "state": "success",
              "context": "version-bump/approved",
              "description": "Version already bumped."
            }'

      - name: Set Status to Pending
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'version bumped') }}
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -d '{
              "state": "pending",
              "context": "version-bump/approved",
              "description": "Waiting for version bump PR approval and merge."
            }'
