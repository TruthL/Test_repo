name: Bump Version via GH CLI

on:
  pull_request_review:
    types: [submitted]

jobs:
  bump-version-api:
    if: >
      github.event.review.state == 'approved' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'staging' &&
      contains(github.event.pull_request.labels.*.name, 'version bump')
      
    runs-on: ubuntu-latest

    steps:
      - name: Bump version.json using gh api
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }} # PAT or App Token with bypass privileges
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref }} # 'staging'
        run: |
          # 1. Fetch current version.json content and SHA from GitHub API
          FILE_DATA=$(gh api "repos/$REPO/contents/version.json?ref=$BRANCH")
          FILE_SHA=$(echo "$FILE_DATA" | jq -r '.sha')
          CONTENT_BASE64=$(echo "$FILE_DATA" | jq -r '.content' | tr -d '\n')
          
          # 2. Decode and increment the version
          CURRENT_JSON=$(echo "$CONTENT_BASE64" | base64 -d)
          NEW_JSON=$(echo "$CURRENT_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if isinstance(data, dict) and 'version' in data:
              data['version'] = int(data['version']) + 1
          elif isinstance(data, int):
              data += 1
          print(json.dumps(data, indent=2))
          ")

          # 3. Base64 encode the updated JSON
          ENCODED_NEW_CONTENT=$(echo "$NEW_JSON" | base64 -w 0)

          # 4. Commit updated file back to staging branch via GitHub API
          gh api --method PUT "repos/$REPO/contents/version.json" \
            -f message="chore: bump version [skip ci]" \
            -f content="$ENCODED_NEW_CONTENT" \
            -f sha="$FILE_SHA" \
            -f branch="$BRANCH"