name: Pass Version Bump Check

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: write
  issues: write

jobs:
  update-status:
    # Only run if the closed PR was a version bump PR AND it was actually merged (not closed without merging)
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.head.ref, 'version-bump')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get parent PR SHA
        id: get-sha
        run: |
          MAIN_PR_SHA=$(gh pr view ${{github.event.pull_request.number}} --json headRefOid --jq '.headRefOid')
          echo "MAIN_PR_SHA=$MAIN_PR_SHA" >> $GITHUB_OUTPUT

      - name: Set Status to Success on Main PR
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          # Fetch the head SHA of the main PR associated with this version bump
          MAIN_PR_SHA="${{ steps.get-sha.outputs.sha }}"
          
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/statuses/$MAIN_PR_SHA \
            -d '{
              "state": "success",
              "context": "version-bump/approved",
              "description": "Version bump has been approved and merged!"
            }'