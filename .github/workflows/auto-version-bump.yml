name: Handle PR Approval
on:
  pull_request_review:
    types: [submitted]
    branches: [new-staging]

permissions:
  contents: write        # git push bump branch + tags
  pull-requests: write   # create PR, read merged PR
  issues: write          # gh label create (labels use Issues API)

concurrency:
  group: version-bump-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  on-approval:
    # Ensure this job only runs if the review was an explicit approval
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: new-staging
          fetch-depth: 1

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh label create "version bump" \
            --description "Bump version when this PR is approved" \
            --color "0E8A16" || true

          gh label create "version bumped" \
            --description "Set by workflow; used for loop prevention" \
            --color "FBCA04" || true

      - name: Check labels and decide whether to proceed
        id: decide
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          pr="${{ github.event.pull_request.number }}"
          target="${{ github.event.pull_request.base.ref }}"

          # No || true: API failures should fail this step, not silently skip
          labels=$(gh pr view "$pr" --json labels --jq '.labels[].name')

          # Loop prevention: skip if this PR has been "version bumped".
          if echo "$labels" | grep -qx "version bumped"; then
            echo "Skipping bump: approved PR has been updated -- no further bump needed"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only proceed if the approved PR carried the "version bump" label
          if ! echo "$labels" | grep -qx "version bump"; then
            echo "Skipping: approved PR does not have the 'version bump' label"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "tag=false" >> "$GITHUB_OUTPUT"

            exit 0
          fi

          echo "skip=false"   >> "$GITHUB_OUTPUT"
          echo "tag=false"    >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Bump version and push to origin
        if: steps.decide.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          TARGET_REF: new-staging

        run: |
          if ! jq -e 'has("major") and has("minor")' version.json > /dev/null; then
            echo "::error::version.json is missing required fields .major and/or .minor"
            exit 1
          fi

          # Automated bumps are always minor. Major/minor field in version.json is bumped
          # manually when you want a new major line (e.g. 2.0).
          jq '.minor += 1' version.json > tmp.json
          mv tmp.json version.json
          bump_type="minor"

          new_version=$(jq -r '"\(.major).\(.minor)"' version.json)
          git add version.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: bump version to ${new_version}"
          git push origin "$TARGET_REF"
          echo "Created version bump commit -> v${new_version} "