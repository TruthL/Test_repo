name: Sync staging and reset qa on main updates

on:
  push:
    branches: [ main ]

permissions:
  contents: write   # needed to push with GITHUB_TOKEN
  pull-requests: write

concurrency:
  group: sync-staging-qa
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Fetch remotes
        run: git fetch origin "+refs/heads/*:refs/remotes/origin/*"

      - name: Fast-forward staging branch pointer to main
        env:
          GH_TOKEN: ${{ github.token }} # PAT with bypass permissions for staging
          REPO: ${{ github.repository }}
          MAIN_SHA: ${{ github.sha }}
        run: |
          echo "Fast-forwarding staging branch to SHA: $MAIN_SHA"

          # Update the git reference for staging directly to match main's SHA
          gh api --method PATCH "repos/$REPO/git/refs/heads/staging" \
            -f sha="$MAIN_SHA" \
            -F force=false

