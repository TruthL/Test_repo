name: Sync staging and reset qa on main updates

on:
  push:
    branches: [ main ]

permissions:
  contents: write   # needed to push with GITHUB_TOKEN
  pull-requests: write

concurrency:
  group: sync-staging-qa
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch remotes
        run: git fetch origin "+refs/heads/*:refs/remotes/origin/*"

      - name: Create PR main → staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Skip if staging already has main (nothing to sync)
          if git merge-base --is-ancestor origin/main origin/staging; then
            echo "staging already contains main -- nothing to sync"
            exit 0
          fi
          existing=$(gh pr list \
            --base staging \
            --head main \
            --state open \
            --json number \
            --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            pr_number="$existing"
            echo "Sync PR already open (#$pr_number)"
          else
            pr_number=$(gh pr create \
              --base staging \
              --head main \
              --title "chore: sync main into staging" \
              --body "Automated sync from main" \
              --json number \
              --jq '.number')
            echo "Created sync PR #$pr_number"
          fi

      # ---- Nuke qa and recreate from main ----
      - name: Reset qa to main (force update)
        run: |
          # This force-updates qa to the exact tip of main (equivalent to delete & recreate)
          git push --force-with-lease origin +refs/heads/main:refs/heads/qa
